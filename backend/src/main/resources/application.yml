spring:
  application:
    name: ecotrace-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.ecotrace.api: INFO
    org.hibernate.SQL: WARN

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

auth:
  moderator-emails: ${MODERATOR_EMAILS:}

jwt:
  issuer: ${JWT_ISSUER:ecotrace-api}
  audience: ${JWT_AUDIENCE:ecotrace-clients}
  access-token-ttl: 15m
  refresh-token-ttl: 30d
  signing:
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}
    key-id: ${JWT_KEY_ID:dev-1}

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    issuer: https://accounts.google.com
    jwks-uri: https://www.googleapis.com/oauth2/v3/certs
    jwks-cache-ttl: 6h

gamification:
  points:
    base-collection: 10
    successful-report-bonus: 5
    false-report-penalty: -10
  volume-multipliers:
    SMALL: 1.0
    MEDIUM: 1.5
    LARGE: 2.0

storage:
  bucket: ${S3_BUCKET:ecotrace-media-local}
  region: ${S3_REGION:us-east-1}
  endpoint: ${S3_ENDPOINT:}
  access-key: ${S3_ACCESS_KEY:}
  secret-key: ${S3_SECRET_KEY:}
  presign-ttl: 10m
  max-upload-bytes: 10485760
