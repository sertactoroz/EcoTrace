spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ecotrace
    username: ecotrace
    password: ecotrace
    hikari:
      maximum-pool-size: 10
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.ecotrace.api: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:dev-google-client-id.apps.googleusercontent.com}

auth:
  moderator-emails:
    - sertactoroz@gmail.com
  admin-emails:
    - sertactoroz@gmail.com

storage:
  bucket: ecotrace-media-local
  endpoint: http://localhost:9000
  region: us-east-1
  access-key: minioadmin
  secret-key: minioadmin
